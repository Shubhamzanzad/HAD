services:

  # ── 1. Discovery Server (Eureka) ─────────────────────────────────────────────
  - type: web
    name: medisync-discovery
    env: docker
    plan: free
    dockerfilePath: ./Backend/DiscoveryServer/Dockerfile
    dockerContext: ./Backend/DiscoveryServer

  # ── 2. API Gateway ────────────────────────────────────────────────────────────
  # healthCheckPath uses /actuator/health — now whitelisted in RouteValidator
  - type: web
    name: medisync-gateway
    env: docker
    plan: free
    dockerfilePath: ./Backend/API-Gateway/Dockerfile
    dockerContext: ./Backend/API-Gateway
    healthCheckPath: /actuator/health

  # ── 3. Account Service ────────────────────────────────────────────────────────
  - type: web
    name: medisync-account
    env: docker
    plan: free
    dockerfilePath: ./Backend/AccountService/Dockerfile
    dockerContext: ./Backend/AccountService
    envVars:
      - key: SERVER_PORT
        value: "8080"
      - key: EUREKA_INSTANCE_HOSTNAME
        value: medisync-account.onrender.com
      - key: EUREKA_INSTANCE_NONSECUREPORTENABLED
        value: "false"
      - key: EUREKA_INSTANCE_SECUREPORTENABLED
        value: "true"
      - key: EUREKA_INSTANCE_SECUREPORT
        value: "443"

  # ── 4. Patient Service (root context — needs AccountService source) ───────────
  - type: web
    name: medisync-patient
    env: docker
    plan: free
    dockerfilePath: ./Backend/PatientService/Dockerfile
    dockerContext: .
    envVars:
      - key: SERVER_PORT
        value: "8080"
      - key: EUREKA_INSTANCE_HOSTNAME
        value: medisync-patient.onrender.com
      - key: EUREKA_INSTANCE_NONSECUREPORTENABLED
        value: "false"
      - key: EUREKA_INSTANCE_SECUREPORTENABLED
        value: "true"
      - key: EUREKA_INSTANCE_SECUREPORT
        value: "443"

  # ── 5. Consent Service (root context — needs AccountService source) ───────────
  - type: web
    name: medisync-consent
    env: docker
    plan: free
    dockerfilePath: ./Backend/ConsentService/Dockerfile
    dockerContext: .
    envVars:
      - key: SERVER_PORT
        value: "8080"
      - key: EUREKA_INSTANCE_HOSTNAME
        value: medisync-consent.onrender.com
      - key: EUREKA_INSTANCE_NONSECUREPORTENABLED
        value: "false"
      - key: EUREKA_INSTANCE_SECUREPORTENABLED
        value: "true"
      - key: EUREKA_INSTANCE_SECUREPORT
        value: "443"

  # ── 6. ABDM Backend ───────────────────────────────────────────────────────────
  - type: web
    name: medisync-abdm
    env: docker
    plan: free
    dockerfilePath: ./ABDM_Backend/Dockerfile
    dockerContext: ./ABDM_Backend
    envVars:
      - key: EUREKA_INSTANCE_HOSTNAME
        value: medisync-abdm.onrender.com
      - key: EUREKA_INSTANCE_NONSECUREPORTENABLED
        value: "false"
      - key: EUREKA_INSTANCE_SECUREPORTENABLED
        value: "true"
      - key: EUREKA_INSTANCE_SECUREPORT
        value: "443"

  # ── 7. Frontend (nginx) ───────────────────────────────────────────────────────
  - type: web
    name: medisync-frontend
    env: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    healthCheckPath: /
